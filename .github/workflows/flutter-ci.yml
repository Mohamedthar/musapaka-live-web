name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38'
          channel: stable
          cache: true

      - name: Create placeholder .env
        run: |
          cat > .env << 'EOF'
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_ANON_KEY=placeholder
          CLOUDINARY_CLOUD_NAME=placeholder
          CLOUDINARY_UPLOAD_PRESET=placeholder
          EOF

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
